<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Libraries for Markdown and Code Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <button class="new-chat-btn" id="newChatBtn">
                <span>+</span> New Chat
            </button>
            <div class="sidebar-footer">
                <p>Gemini Pro Engine</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header>
                <h1>AI Chatbot</h1>
            </header>

            <div id="chatWindow" class="chat-window">
                <!-- Messages will appear here -->
                <div class="welcome-message">
                    <h2>How can I help you today?</h2>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Message Gemini..." rows="1"></textarea>
                    <button id="sendBtn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
                <p class="disclaimer">AI can make mistakes. Check important info.</p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
